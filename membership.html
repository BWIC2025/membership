<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BWIC Membership Access</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FAF7F2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #EDE8E0;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .icon {
      font-size: 36px;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #7a7a7a;
      margin-bottom: 1.75rem;
      line-height: 1.5;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      letter-spacing: 2px;
      text-align: center;
      border: 1px solid #DDD8CF;
      border-radius: 10px;
      outline: none;
      color: #1a1a1a;
      background: #FAFAF8;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #BA7517;
    }

    .error {
      font-size: 13px;
      color: #c0392b;
      margin-bottom: 12px;
      display: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #BA7517;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #9A6010; }

    .success-box {
      display: none;
      margin-top: 1.5rem;
      padding: 1.25rem;
      background: #F0F7EB;
      border-radius: 12px;
      border: 1px solid #C0DD97;
    }

    .success-box p {
      font-size: 14px;
      color: #3B6D11;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .success-box a {
      display: inline-block;
      background: #3B6D11;
      color: #fff;
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s;
    }

    .success-box a:hover { background: #27500A; }

    .footer {
      margin-top: 1.75rem;
      font-size: 12px;
      color: #AAAAAA;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🤎</div>
    <h1>Black Women In Color</h1>
    <p class="subtitle">Enter your exclusive access code<br>to unlock the membership link.</p>

    <input type="text" id="codeInput" placeholder="Enter access code" autocomplete="off" />
    <div class="error" id="errorMsg">Incorrect code. Please try again.</div>
    <button id="submitBtn" onclick="checkCode()">Access Membership</button>

    <div class="success-box" id="successBox">
      <p>You're in! 🤎 Click below to complete your membership.</p>
      <a href="https://buy.stripe.com/28E00kddG2j7guq4YK3wQ07" target="_blank">Go to Membership Page</a>
    </div>

    <p class="footer">Questions? hello@blackwomenincolor.com</p>
  </div>

  <script>
    function checkCode() {
      const input = document.getElementById('codeInput').value.trim().toLowerCase();
      const error = document.getElementById('errorMsg');
      const success = document.getElementById('successBox');
      const btn = document.getElementById('submitBtn');

      if (input === 'blkgirlclay') {
        error.style.display = 'none';
        success.style.display = 'block';
        btn.style.display = 'none';
      } else {
        error.style.display = 'block';
        success.style.display = 'none';
      }
    }

    document.getElementById('codeInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkCode();
    });
  </script>
</body>
</html>
